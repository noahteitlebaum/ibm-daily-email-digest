name: IBM Daily Digest

# Free, always-on scheduler. Runs on GitHub's servers — no local machine needed.
on:
  schedule:
    # Weekdays at 9 AM Eastern. GitHub cron is UTC and does NOT observe DST:
    #   13:00 UTC = 9 AM EDT (summer, ~Mar-Nov)  <-- set now
    #   14:00 UTC = 9 AM EST (winter). Switch to "0 14 * * 1-5" in November.
    - cron: "0 13 * * 1-5"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab to test

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore grounding files (from secrets; not stored in the repo)
        env:
          GROUNDING_MD: ${{ secrets.GROUNDING_MD }}
          PRODUCT_HIERARCHY: ${{ secrets.PRODUCT_HIERARCHY }}
        run: |
          mkdir -p grounding
          printf '%s' "$GROUNDING_MD" > grounding/Client_News_to_IBM_Opportunity_Insights.md
          printf '%s' "$PRODUCT_HIERARCHY" > grounding/IBM_Product_Hierarchy.txt

      - name: Run the digest
        env:
          EMAIL_METHOD: sendgrid
          ICA_API_KEY: ${{ secrets.ICA_API_KEY }}
          ICA_CHAT_URL: ${{ secrets.ICA_CHAT_URL }}
          ICA_MODEL: ${{ secrets.ICA_MODEL }}
          ICA_AUTH_SCHEME: ${{ secrets.ICA_AUTH_SCHEME }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          RECIPIENTS_NB_IRVING: ${{ secrets.RECIPIENTS_NB_IRVING }}
          RECIPIENTS_LCBO_LOBLAWS: ${{ secrets.RECIPIENTS_LCBO_LOBLAWS }}
          RECIPIENTS_NL_NS_EMERA: ${{ secrets.RECIPIENTS_NL_NS_EMERA }}
          RECIPIENTS_INTERAC_SYMCOR_PAYMENTS: ${{ secrets.RECIPIENTS_INTERAC_SYMCOR_PAYMENTS }}
          RECIPIENTS_GFL_CBS_GTAA: ${{ secrets.RECIPIENTS_GFL_CBS_GTAA }}
          # Optional pilot: if this secret is set, EVERY team's digest goes only
          # to that address. Delete the secret to send to real recipients.
          ONLY_TO: ${{ secrets.ONLY_TO }}
        run: python -m src.main --no-decks
