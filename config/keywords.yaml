# ============================================================================
# Guardrails / cautions (see USAGE NOTES in source + filter.py logic)
# ============================================================================
cautions:
  # Reject any article whose only Irving match is the bare word "Irving"
  # with no qualifier -> avoids conflating JDI and Irving Oil.
  require_irving_qualifier: true
  # Terms that, if matched, cause the article to be DROPPED (out of scope).
  exclude_terms:
    - "Irving Shipbuilding"
    - "Halifax Shipyard"
  # GNB returns far higher volume; cap how many GNB items reach the digest.
  # Raised 8 -> 15 (2026-07-22) after expanding GNB to cover departments,
  # crown corporations, and municipalities per Michael Brooker's request.
  gnb_max_items: 15
